name: Build and Push Docker Images (CD)

on:
  push:
    branches:
      - main
    # Only run when code changes are pushed to main
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  docker_build_push:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repo
      uses: actions/checkout@v3

    # NOTE: You will need to add Docker Hub credentials as secrets in GitHub (DOCKER_USERNAME and DOCKER_PASSWORD)
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 1. Build & Push Frontend
    - name: Build and push Frontend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/hackathon-frontend:latest

    # 2. Build & Push Backend Services (Assuming a generic Backend folder structure or multiple Dockerfiles)
    # This loop needs refinement once the actual Spring Boot microservices structure is created.
    # E.g., user-service, hackathon-service
    - name: Build and push Backend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/hackathon-api-gateway:latest
