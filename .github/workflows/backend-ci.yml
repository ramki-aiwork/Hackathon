name: Backend CI (Spring Boot)

on:
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew (if applicable)
      run: chmod +x gradlew || echo "No gradlew found"

    # NOTE: Assuming Maven for now, but this could be Gradle if preferred.
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Run Tests
      run: mvn test

    - name: Checkstyle
      run: mvn checkstyle:check || echo "Checkstyle not configured yet"
